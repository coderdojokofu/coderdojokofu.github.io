name: Update Next Event

on:
  schedule:
    - cron: '0 1 * * *'  # 10:00 JST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-event:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch next event from Connpass
        run: python3 scripts/fetch_event.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add event.json
          git diff --staged --quiet || git commit -m "chore: update next event from Connpass"
          git push
